<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Crop image to square</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; max-width: 560px; }
    h1 { font-size: 18px; color: #2D3436; margin: 0 0 8px; }
    p { color: #495057; font-size: 14px; margin: 0 0 16px; }
    input[type="file"] { margin: 10px 0; }
    canvas { display: block; margin: 16px 0; border: 1px solid #e2e8f0; max-width: 100%; }
    button { background: #169976; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    button:hover { background: #128066; }
  </style>
</head>
<body>
  <h1>Crop to square</h1>
  <p>Choose your image. It will be center-cropped to a square (same width and height). Then click Download.</p>
  <input type="file" id="file" accept="image/*" />
  <canvas id="canvas" style="display:none;"></canvas>
  <button id="download" style="display:none;">Download square image</button>

  <script>
    const fileInput = document.getElementById('file');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('download');

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const img = new Image();
      img.onload = () => {
        const w = img.width;
        const h = img.height;
        const size = Math.min(w, h);
        canvas.width = size;
        canvas.height = size;
        const sx = (w - size) / 2;
        const sy = (h - size) / 2;
        ctx.drawImage(img, sx, sy, size, size, 0, 0, size, size);
        canvas.style.display = 'block';
        downloadBtn.style.display = 'inline-block';
        canvas.dataset.name = file.name.replace(/\.[^.]+$/, '') + '-square.png';
      };
      img.src = URL.createObjectURL(file);
    });

    downloadBtn.addEventListener('click', () => {
      const a = document.createElement('a');
      a.download = canvas.dataset.name || 'image-square.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  </script>
</body>
</html>
